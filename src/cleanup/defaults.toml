scan_paths = ["${HOME}/Downloads", "${CACHE_DIR}"]

[[rules]]
name = "downloads"
category = "user"
path = "${HOME}/Downloads"
pattern = "**/*"
risky = false
enabled = true

[[rules]]
name = "cache"
category = "system"
path = "${CACHE_DIR}"
pattern = "**/*"
risky = false
enabled = true
min_age_hours = 24
