name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cargo-audit:
    name: Cargo audit (vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --force

      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify cargo-audit
        run: cargo-audit --version

      - name: Run cargo audit (workspace)
        run: cargo audit --workspace
