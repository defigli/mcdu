name: Homebrew Formula Update

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        run: |
          gh release view ${{ github.event.release.tag_name }} --json assets --jq '.assets[] | select(.name | contains("tar.gz"))'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get SHA256
        id: sha256
        run: |
          # Get the macOS x86_64 tarball URL
          ASSET_URL=$(gh release view ${{ github.event.release.tag_name }} --json assets --jq '.assets[] | select(.name | contains("macos-x86_64")) | .url')
          
          # Download and compute SHA256
          curl -L -o mcdu.tar.gz "$ASSET_URL"
          SHA256=$(shasum -a 256 mcdu.tar.gz | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          
          # Also get version without 'v' prefix
          VERSION=${{ github.event.release.tag_name#v }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update formula
        run: |
          # Clone homebrew-core fork (user should fork homebrew-core and add their fork as a remote)
          git clone https://github.com/Homebrew/homebrew-core.git
          cd homebrew-core
          
          # Get the formula name (mcdu.rb)
          FORMULA="Formula/m/mcdu.rb"
          
          # Check if formula exists
          if [ -f "$FORMULA" ]; then
            # Update the formula
            sed -i.bak "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.sha256.outputs.version }}.tar.gz\"|g" "$FORMULA"
            sed -i.bak "s|sha256 \".*\"|sha256 \"${{ steps.sha256.outputs.sha256 }}\"|g" "$FORMULA"
            
            # Commit and push
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$FORMULA"
            git commit -m "mcdu ${{ steps.sha256.outputs.version }} (automatic update)"
            
            # Push to fork (user needs to add their fork as remote)
            git remote add fork https://github.com/YOUR_USERNAME/homebrew-core.git
            git push fork main --force
            
            # Create PR to homebrew-core
            gh pr create --repo Homebrew/homebrew-core --title "mcdu ${{ steps.sha256.outputs.version }}" --body "Automatic version update from ${{ github.repository }} release ${{ github.event.release.tag_name }}" --head YOUR_USERNAME:main --base main
          fi
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GH_TOKEN }}
