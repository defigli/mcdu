name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            sign: true
          - os: macos-aarch64
            runner: macos-14  # ARM runner
            target: aarch64-apple-darwin
            sign: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import Apple code signing certificate
        if: matrix.sign
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Sign binary (macOS)
        if: matrix.sign
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          BINARY_PATH=target/${{ matrix.target }}/release/mcdu
          codesign --force --deep --sign "$CODESIGN_IDENTITY" "$BINARY_PATH"
          codesign --verify --verbose "$BINARY_PATH"

      - name: Strip binary (Linux)
        if: startsWith(matrix.os, 'linux')
        run: strip target/${{ matrix.target }}/release/mcdu

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mcdu-${{ matrix.os }}.tar.gz mcdu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdu-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/mcdu-${{ matrix.os }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Extract version-specific notes from CHANGELOG
          awk -v version="$VERSION" '
            /^\\[/ { in_section=0; if ($0 == "[" version "]") { in_section=1; next } }
            in_section && /^\\[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.txt

          # Create notes with header
          echo "## What's Changed" > release-notes.md
          cat release-notes.txt >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: artifacts/mcdu-*/mcdu-*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts for SHA256
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "$HOME/homebrew/bin" >> $GITHUB_PATH

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          LINUX_SHA=$(sha256sum artifacts/mcdu-linux-x86_64/mcdu-linux-x86_64.tar.gz | cut -d' ' -f1)
          MACOS_X86_SHA=$(sha256sum artifacts/macos-x86_64/mcdu-macos-x86_64.tar.gz | cut -d' ' -f1)
          MACOS_ARM_SHA=$(sha256sum artifacts/macos-aarch64/mcdu-macos-aarch64.tar.gz | cut -d' ' -f1)

          {
            echo "version=$VERSION"
            echo "linux_sha=$LINUX_SHA"
            echo "macos_x86_sha=$MACOS_X86_SHA"
            echo "macos_arm_sha=$MACOS_ARM_SHA"
          } >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          LINUX_SHA="${{ steps.checksums.outputs.linux_sha }}"
          MACOS_X86_SHA="${{ steps.checksums.outputs.macos_x86_sha }}"
          MACOS_ARM_SHA="${{ steps.checksums.outputs.macos_arm_sha }}"

          sed -i.bak \
            -e "s|url \"https://archive.github.com|url \"https://github.com|" \
            -e "s/version \"[^\"]*\"/version \"$VERSION\"/" \
            -e "s/sha256 \"linux\" \"[^\"]*\"/sha256 \"linux\" \"$LINUX_SHA\"/" \
            -e "s/sha256 \"macos_x86_64\" \"[^\"]*\"/sha256 \"macos_x86_64\" \"$MACOS_X86_SHA\"/" \
            -e "s/sha256 \"macos_aarch64\" \"[^\"]*\"/sha256 \"macos_aarch64\" \"$MACOS_ARM_SHA\"/" \
            packaging/homebrew/mcdu.rb
          rm packaging/homebrew/mcdu.rb.bak

      - name: Create PR to homebrew-tap
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Update mcdu to ${{ steps.checksums.outputs.version }}"
          branch: "update-mcdu-${{ steps.checksums.outputs.version }}"
          path: packaging/homebrew/
          commit-message: "Update mcdu to ${{ steps.checksums.outputs.version }}"
          body: |
            Updates mcdu formula to version ${{ steps.checksums.outputs.version }}.

            SHA256 checksums:
            - Linux: ${{ steps.checksums.outputs.linux_sha }}
            - macOS x86_64: ${{ steps.checksums.outputs.macos_x86_sha }}
            - macOS aarch64: ${{ steps.checksums.outputs.macos_arm_sha }}

            Published by: @${{ github.actor }}
          base: master
          labels: automated pr
          delete-branch: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
