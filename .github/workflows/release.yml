name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            static: true
          - os: linux-aarch64-musl
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            static: true
          - os: linux-x86_64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            sign: true
          - os: macos-aarch64
            runner: macos-14  # ARM runner
            target: aarch64-apple-darwin
            sign: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import Apple code signing certificate
        if: matrix.sign
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Sign binary (macOS)
        if: matrix.sign
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          BINARY_PATH=target/${{ matrix.target }}/release/mcdu
          codesign --force --deep --sign "$CODESIGN_IDENTITY" "$BINARY_PATH"
          codesign --verify --verbose "$BINARY_PATH"

      - name: Strip binary (Linux)
        if: startsWith(matrix.os, 'linux')
        run: strip target/${{ matrix.target }}/release/mcdu

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mcdu-${{ matrix.os }}.tar.gz mcdu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdu-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/mcdu-${{ matrix.os }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate and display checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          LINUX_MUSL_X86_SHA=$(sha256sum artifacts/mcdu-linux-x86_64-musl/mcdu-linux-x86_64-musl.tar.gz | cut -d' ' -f1)
          LINUX_MUSL_ARM_SHA=$(sha256sum artifacts/mcdu-linux-aarch64-musl/mcdu-linux-aarch64-musl.tar.gz | cut -d' ' -f1)
          LINUX_GNU_X86_SHA=$(sha256sum artifacts/mcdu-linux-x86_64-gnu/mcdu-linux-x86_64-gnu.tar.gz | cut -d' ' -f1)
          MACOS_X86_SHA=$(sha256sum artifacts/macos-x86_64/mcdu-macos-x86_64.tar.gz | cut -d' ' -f1)
          MACOS_ARM_SHA=$(sha256sum artifacts/macos-aarch64/mcdu-macos-aarch64.tar.gz | cut -d' ' -f1)

          echo "## Binary Checksums for $VERSION" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Linux (Static - works everywhere)" >> release-notes.md
          echo "**x86_64:** \`$LINUX_MUSL_X86_SHA\`" >> release-notes.md
          echo "**aarch64:** \`$LINUX_MUSL_ARM_SHA\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Linux (GNU)" >> release-notes.md
          echo "**x86_64:** \`$LINUX_GNU_X86_SHA\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### macOS" >> release-notes.md
          echo "**x86_64:** \`$MACOS_X86_SHA\`" >> release-notes.md
          echo "**aarch64:** \`$MACOS_ARM_SHA\`" >> release-notes.md
          echo "" >> release-notes.md

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Extract version-specific notes from CHANGELOG
          awk -v version="$VERSION" '
            /^\\[/ { in_section=0; if ($0 == "[" version "]") { in_section=1; next } }
            in_section && /^\\[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.txt

          # Create notes with header
          echo "## What's Changed" > release-notes.md
          cat release-notes.txt >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: artifacts/mcdu-*/mcdu-*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
