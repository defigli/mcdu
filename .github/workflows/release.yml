name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: linux-aarch64-musl
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: linux-x86_64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - os: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-musl)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (native Linux)
        if: startsWith(matrix.os, 'linux') && !matrix.cross
        run: strip target/${{ matrix.target }}/release/mcdu

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mcdu-${{ matrix.os }}.tar.gz mcdu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdu-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/mcdu-${{ matrix.os }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate checksums
        run: |
          echo "## Checksums" > checksums.md
          echo "" >> checksums.md
          echo '```' >> checksums.md
          for f in artifacts/mcdu-*/mcdu-*.tar.gz; do
            sha256sum "$f" | sed 's|artifacts/mcdu-[^/]*/||' >> checksums.md
          done
          echo '```' >> checksums.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: checksums.md
          draft: false
          prerelease: false
          files: artifacts/mcdu-*/mcdu-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
