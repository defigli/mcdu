name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-x86_64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: linux-aarch64-musl
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: linux-x86_64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - os: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install musl-tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: startsWith(matrix.os, 'linux')
        run: strip target/${{ matrix.target }}/release/mcdu

      - name: Import code signing certificate
        if: startsWith(matrix.os, 'macos')
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Sign binary (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$CODESIGN_IDENTITY" target/${{ matrix.target }}/release/mcdu
          codesign --verify --verbose target/${{ matrix.target }}/release/mcdu

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mcdu-${{ matrix.os }}.tar.gz mcdu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdu-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/mcdu-${{ matrix.os }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate checksums
        run: |
          echo "## Checksums" > checksums.md
          echo "" >> checksums.md
          echo '```' >> checksums.md
          for f in artifacts/mcdu-*/mcdu-*.tar.gz; do
            sha256sum "$f" | sed 's|artifacts/mcdu-[^/]*/||' >> checksums.md
          done
          echo '```' >> checksums.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: checksums.md
          draft: false
          prerelease: false
          files: artifacts/mcdu-*/mcdu-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/mikalv/mcdu/releases/download/v${VERSION}"

          declare -A ASSETS=(
            ["macos_arm"]="mcdu-macos-aarch64.tar.gz"
            ["macos_x86"]="mcdu-macos-x86_64.tar.gz"
            ["linux_arm"]="mcdu-linux-aarch64-musl.tar.gz"
            ["linux_x86"]="mcdu-linux-x86_64-musl.tar.gz"
          )

          for key in "${!ASSETS[@]}"; do
            file="${ASSETS[$key]}"
            curl -sL "${BASE}/${file}" -o "/tmp/${file}"
            sha=$(sha256sum "/tmp/${file}" | cut -d' ' -f1)
            echo "${key}_sha256=${sha}" >> "$GITHUB_OUTPUT"
          done
        id: checksums

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: mikalv/homebrew-mcdu
          token: ${{ secrets.GH_PAT }}
          path: homebrew-mcdu

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > homebrew-mcdu/Formula/mcdu.rb << 'FORMULA_EOF'
          class Mcdu < Formula
            desc "Modern disk usage analyzer with TUI and developer cleanup tools"
            homepage "https://github.com/mikalv/mcdu"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mikalv/mcdu/releases/download/v#{version}/mcdu-macos-aarch64.tar.gz"
                sha256 "MACOS_ARM_SHA"
              else
                url "https://github.com/mikalv/mcdu/releases/download/v#{version}/mcdu-macos-x86_64.tar.gz"
                sha256 "MACOS_X86_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/mikalv/mcdu/releases/download/v#{version}/mcdu-linux-aarch64-musl.tar.gz"
                sha256 "LINUX_ARM_SHA"
              else
                url "https://github.com/mikalv/mcdu/releases/download/v#{version}/mcdu-linux-x86_64-musl.tar.gz"
                sha256 "LINUX_X86_SHA"
              end
            end

            def install
              bin.install "mcdu"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mcdu --version")
            end
          end
          FORMULA_EOF

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-mcdu/Formula/mcdu.rb
          sed -i "s/MACOS_ARM_SHA/${{ steps.checksums.outputs.macos_arm_sha256 }}/" homebrew-mcdu/Formula/mcdu.rb
          sed -i "s/MACOS_X86_SHA/${{ steps.checksums.outputs.macos_x86_sha256 }}/" homebrew-mcdu/Formula/mcdu.rb
          sed -i "s/LINUX_ARM_SHA/${{ steps.checksums.outputs.linux_arm_sha256 }}/" homebrew-mcdu/Formula/mcdu.rb
          sed -i "s/LINUX_X86_SHA/${{ steps.checksums.outputs.linux_x86_sha256 }}/" homebrew-mcdu/Formula/mcdu.rb

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' homebrew-mcdu/Formula/mcdu.rb

      - name: Commit and push
        run: |
          cd homebrew-mcdu
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mcdu.rb
          git commit -m "Update mcdu to ${{ steps.version.outputs.version }}"
          git push
