# Terraform
[[rules]]
name = "terraform-plugin-cache"
category = "DevOps"
description = "Terraform plugin cache"
pattern = "**/*"
path = "${HOME}/.terraform.d/plugin-cache"
match_type = "both"
min_age_hours = 720

[[rules]]
name = "terraform-local"
category = "DevOps"
description = "Terraform local directories"
pattern = "**/.terraform"
path = "${HOME}"
match_type = "directory"
project_marker = "*.tf"
max_depth = 5

# ============================================================================
# SYSTEM
# ============================================================================

# Homebrew (macOS)
[[rules]]
name = "homebrew-downloads"
category = "System"
description = "Homebrew download cache"
pattern = "**/*"
path = "${HOME}/Library/Caches/Homebrew/downloads"
match_type = "both"
min_age_hours = 168

# Xcode (macOS)
[[rules]]
name = "xcode-deriveddata"
category = "System"
description = "Xcode DerivedData"
pattern = "**/*"
path = "${HOME}/Library/Developer/Xcode/DerivedData"
match_type = "both"
min_age_hours = 168
risky = true
warning = "Xcode build cache - will slow down next build"

[[rules]]
name = "xcode-device-support"
category = "System"
description = "iOS Device Support files"
pattern = "*"
path = "${HOME}/Library/Developer/Xcode/iOS DeviceSupport"
match_type = "directory"
min_age_hours = 720
warning = "Old iOS versions - may need for older device debugging"

[[rules]]
name = "xcode-simulators"
category = "System"
description = "iOS Simulator devices"
pattern = "*"
path = "${HOME}/Library/Developer/CoreSimulator/Devices"
match_type = "directory"
min_age_hours = 720
risky = true
warning = "Simulator devices - use 'xcrun simctl list' to check"

# Trash
[[rules]]
name = "trash-macos"
category = "System"
description = "Trash (macOS)"
pattern = "**/*"
path = "${HOME}/.Trash"
match_type = "both"
min_age_hours = 168
risky = true
warning = "Items in Trash"

[[rules]]
name = "trash-linux"
category = "System"
description = "Trash (Linux)"
pattern = "**/*"
path = "${HOME}/.local/share/Trash"
match_type = "both"
min_age_hours = 168
risky = true
warning = "Items in Trash"

# Downloads (kept from original)
[[rules]]
name = "downloads"
category = "System"
description = "Old downloads"
pattern = "**/*"
path = "${HOME}/Downloads"
match_type = "both"
min_age_hours = 720  # 30 days
