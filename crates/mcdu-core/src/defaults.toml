# mcdu Developer Cleanup - Default Rules
# A comprehensive TUI CCleaner for developers
#
# Categories:
#   - Rust/Cargo
#   - Node.js
#   - Python
#   - Elixir/Erlang
#   - Go
#   - Java/JVM
#   - Ruby
#   - PHP/Composer
#   - .NET/NuGet
#   - Zig
#   - Deno
#   - Swift/iOS
#   - Version Managers (asdf, mise, rustup, nvm)
#   - IDE Caches (VS Code, JetBrains, Vim/Neovim)
#   - Browser Caches (Chrome, Firefox, Safari, etc.)
#   - DevOps (Docker, Kubernetes, Terraform)
#   - System (Homebrew, Xcode, Trash)

# Default scan paths - where to look for project artifacts
scan_paths = [
    "${HOME}/Downloads",
    "${HOME}/Projects",
    "${HOME}/Code",
    "${HOME}/Developer",
    "${HOME}/repos",
    "${HOME}/dev",
    "${HOME}/src",
    "${HOME}/workspace",
]

# ============================================================================
# RUST/CARGO
# ============================================================================

[[rules]]
name = "cargo-registry-cache"
category = "Rust/Cargo"
description = "Downloaded crate archives"
pattern = "**/*"
path = "${HOME}/.cargo/registry/cache"
match_type = "both"
min_age_hours = 168  # 1 week

[[rules]]
name = "cargo-registry-src"
category = "Rust/Cargo"
description = "Extracted crate sources"
pattern = "**/*"
path = "${HOME}/.cargo/registry/src"
match_type = "both"
min_age_hours = 168

[[rules]]
name = "cargo-git-checkouts"
category = "Rust/Cargo"
description = "Git dependency checkouts"
pattern = "**/*"
path = "${HOME}/.cargo/git/checkouts"
match_type = "both"
min_age_hours = 168

[[rules]]
name = "cargo-git-db"
category = "Rust/Cargo"
description = "Git dependency bare repos"
pattern = "**/*"
path = "${HOME}/.cargo/git/db"
match_type = "both"
min_age_hours = 168

[[rules]]
name = "rust-target-dirs"
category = "Rust/Cargo"
description = "Rust build artifacts (target/)"
pattern = "**/target"
path = "${HOME}"
match_type = "directory"
project_marker = "Cargo.toml"
max_depth = 6
exclude = [".git", "node_modules"]

